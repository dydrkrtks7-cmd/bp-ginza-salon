    <circle cx="885" cy="82" r="83" fill="#880e4f" opacity="0.15"/>
    <circle cx="1190" cy="88" r="43" fill="#880e4f" opacity="0.09"/>
    <circle cx="1061" cy="70" r="43" fill="#880e4f" opacity="0.05"/>
    <circle cx="739" cy="189" r="36" fill="#880e4f" opacity="0.10"/>
    <circle cx="1119" cy="368" r="85" fill="#880e4f" opacity="0.17"/>
    <rect x="841" y="350" width="72" height="38" rx="8" fill="#b71c1c" opacity="0.04" transform="rotate(38, 1226, 135)"/>
